name: Skill Quality Gate

on:
  pull_request:
    paths:
      - 'skills/**'
      - '.github/workflows/skill-quality-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'skills/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check language (no non-English skills)
        run: |
          python3 << 'EOF'
          import os, re
          non_english = []
          
          if os.path.exists('skills'):
            for domain in os.listdir('skills'):
              domain_path = f'skills/{domain}'
              if not os.path.isdir(domain_path):
                continue
              for skill in os.listdir(domain_path):
                path = f'{domain_path}/{skill}/SKILL.md'
                if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                    content = f.read()
                    # Chinese, Japanese, Korean, Arabic, Cyrillic
                    if re.search(r'[\u4e00-\u9fff]|[\u3040-\u309f]|[\u30a0-\u30ff]|[\u0600-\u06ff]|[\u0400-\u04ff]', content):
                      non_english.append(f'{domain}/{skill}')
          
          if non_english:
            print(f'❌ FAILED: Found {len(non_english)} non-English skills')
            for skill in non_english:
              print(f'   - {skill}')
            exit(1)
          
          print(f'✅ PASSED: Language check (all English)')
          EOF

      - name: Check for code examples
        run: |
          python3 << 'EOF'
          import os, re
          missing = []
          
          if os.path.exists('skills'):
            for domain in os.listdir('skills'):
              domain_path = f'skills/{domain}'
              if not os.path.isdir(domain_path):
                continue
              for skill in os.listdir(domain_path):
                path = f'{domain_path}/{skill}/SKILL.md'
                if os.path.exists(path):
                  size = os.path.getsize(path)
                  # Only check substantive skills (>3KB)
                  if size > 3000:
                    with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                      if not re.search(r'(BAD|GOOD|❌|✅)', content):
                        missing.append(f'{domain}/{skill}')
          
          if missing and len(missing) > 10:
            print(f'❌ FAILED: Too many skills ({len(missing)}) missing examples')
            for skill in missing[:5]:
              print(f'   - {skill}')
            if len(missing) > 5:
              print(f'   ... and {len(missing)-5} more')
            exit(1)
          elif missing:
            print(f'⚠️  WARNING: {len(missing)} substantive skills missing good/bad examples')
            for skill in missing:
              print(f'   - {skill}')
          else:
            print(f'✅ PASSED: Code examples check')
          EOF

      - name: Validate YAML frontmatter
        run: |
          python3 << 'EOF'
          import os, re, yaml
          
          errors = []
          
          if os.path.exists('skills'):
            for domain in os.listdir('skills'):
              domain_path = f'skills/{domain}'
              if not os.path.isdir(domain_path):
                continue
              for skill in os.listdir(domain_path):
                path = f'{domain_path}/{skill}/SKILL.md'
                if os.path.exists(path):
                  try:
                    with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                      # Extract frontmatter
                      match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
                      if match:
                        fm = match.group(1)
                        try:
                          yaml.safe_load(fm)
                        except yaml.YAMLError as e:
                          errors.append(f'{domain}/{skill}: Invalid YAML - {str(e)}')
                      else:
                        errors.append(f'{domain}/{skill}: Missing YAML frontmatter')
                  except Exception as e:
                    errors.append(f'{domain}/{skill}: {str(e)}')
          
          if errors:
            print(f'❌ FAILED: {len(errors)} frontmatter errors')
            for error in errors[:5]:
              print(f'   - {error}')
            if len(errors) > 5:
              print(f'   ... and {len(errors)-5} more')
            exit(1)
          
          print(f'✅ PASSED: YAML frontmatter validation')
          EOF

      - name: Check for required metadata fields
        run: |
          python3 << 'EOF'
          import os, re, yaml
          
          required_fields = ['name', 'description', 'license', 'compatibility', 'metadata']
          missing_fields = []
          
          if os.path.exists('skills'):
            for domain in os.listdir('skills'):
              domain_path = f'skills/{domain}'
              if not os.path.isdir(domain_path):
                continue
              for skill in os.listdir(domain_path):
                path = f'{domain_path}/{skill}/SKILL.md'
                if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                    content = f.read()
                    match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
                    if match:
                      fm = yaml.safe_load(match.group(1))
                      for field in required_fields:
                        if field not in fm:
                          missing_fields.append(f'{domain}/{skill}: missing {field}')
          
          if missing_fields:
            print(f'❌ FAILED: {len(missing_fields)} skills missing required fields')
            for error in missing_fields[:5]:
              print(f'   - {error}')
            if len(missing_fields) > 5:
              print(f'   ... and {len(missing_fields)-5} more')
            exit(1)
          
          print(f'✅ PASSED: Required metadata fields')
          EOF

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint
