---
metadata:
  name: "cncf-kubernetes-cluster-operations"
  category: "kubernetes"
  description: "CNCF certified Kubernetes operations including cluster management, pod orchestration, and resource management using kubectl"
  tags:
    - "kubernetes"
    - "cncf"
    - "k8s"
    - "container-orchestration"
    - "cluster-management"
    - "kubectl"
    - "pod-ops"
    - "resource-management"
  version: "1.0.0"
  author: "OpenCode CNCF Integration"
  dependencies:
    - "kubectl"

input_schema:
  type: "object"
  properties:
    command:
      type: "string"
      description: "kubectl subcommand (e.g., get pods, apply -f, describe pod)"
    namespace:
      type: "string"
      description: "Kubernetes namespace (optional)"
    context:
      type: "string"
      description: "Kubernetes context (optional)"
  required:
    - "command"

output_schema:
  type: "object"
  properties:
    success:
      type: "boolean"
    output:
      type: "string"
    error:
      type: "string"
      nullable: true
    durationMs:
      type: "number"

performance:
  averageLatencyMs: 2500
  successRate: 0.98
  lastUpdated: "2024-01-15"
