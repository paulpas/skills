name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Install dependencies and cache them
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Upload Dependencies Cache
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules
          retention-days: 1

  # Run linting checks
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Dependencies Cache
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Check
        run: npm run format:check

  # Run unit tests with coverage
  test-unit:
    name: Test Unit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Dependencies Cache
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Run Unit Tests with Coverage
        run: npm run test:unit

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 7

  # Run integration tests
  test-integration:
    name: Test Integration
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Dependencies Cache
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Run Integration Tests
        run: npm run test:integration

  # Run security checks
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Dependencies Cache
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Run Security Audit
        run: npm audit --audit-level=moderate

  # Type checking
  types:
    name: Type Checking
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Dependencies Cache
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Run Type Check
        run: npm run typecheck

  # Build the project
  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-unit
      - test-integration
      - security
      - types
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Dependencies Cache
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Coverage check (must run after all tests)
  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Dependencies Cache
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules

      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage/

      - name: Run Coverage Threshold Check
        run: |
          npm install -g codecov
          codecov --file=coverage/coverage-final.json
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
