name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Default to least-privilege; jobs may escalate as needed.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ----------------------------------------------------------------------
  # Lint (ESLint, READ-ONLY in CI — no --fix)
  # ----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run ESLint (no auto-fix in CI)
        run: npx eslint 'src/**/*.ts' 'agent-skill-routing-system/src/**/*.ts'

  # ----------------------------------------------------------------------
  # Prettier formatting check
  # ----------------------------------------------------------------------
  format:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: npm run format:check

  # ----------------------------------------------------------------------
  # TypeScript type checking
  # ----------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: npm run typecheck

  # ----------------------------------------------------------------------
  # Unit tests + coverage
  # ----------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: Run Unit Tests
        run: npm run test:unit
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ----------------------------------------------------------------------
  # Integration tests
  # ----------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: npm run test:integration

  # ----------------------------------------------------------------------
  # Coverage threshold + Codecov upload
  # ----------------------------------------------------------------------
  coverage:
    name: Coverage Threshold
    runs-on: ubuntu-latest
    needs: test-unit
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage/
      - name: Enforce coverage >= 70%
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::warning::coverage-summary.json missing — ensure jest reporter 'json-summary' is enabled."
            exit 0
          fi
          COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          echo "Line coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN { if (c+0 < 70) { print "::error::Coverage " c "% < 70% threshold"; exit 1 } }'
      - name: Upload to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-summary.json
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ----------------------------------------------------------------------
  # npm audit + Snyk
  # ----------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - name: npm audit (production deps only)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
      - name: Snyk
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@v0.4.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ----------------------------------------------------------------------
  # Conventional commits
  # ----------------------------------------------------------------------
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js

  # ----------------------------------------------------------------------
  # Build (depends on lint, typecheck, tests passing)
  # ----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test-unit, test-integration]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            agent-skill-routing-system/dist/
          retention-days: 7
          if-no-files-found: ignore

  # ----------------------------------------------------------------------
  # Final aggregator: required check for branch protection
  # ----------------------------------------------------------------------
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, format, typecheck, test-unit, test-integration, coverage, security, build]
    steps:
      - name: Verify all required jobs passed
        run: |
          echo "Job results: ${{ toJSON(needs) }}"
          if echo '${{ toJSON(needs) }}' | grep -E '"result":\s*"(failure|cancelled)"'; then
            echo "::error::One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."
