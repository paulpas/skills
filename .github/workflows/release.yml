name: Release Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Prepare release and analyze commits
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm test

      - name: Run Security Audit
        run: npm audit --audit-level=moderate

      - name: Semantic Release
        id: release
        uses: semantic-release/github@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Output Release Info
        if: ${{ steps.release.outputs.newReleasePublished == 'true' }}
        run: |
          echo "Release published: ${{ steps.release.outputs.newReleaseVersion }}"
          echo "Release notes: ${{ steps.release.outputs.newReleaseNotes }}"

  # Build and publish package
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.newReleasePublished == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Update documentation
  docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.newReleasePublished == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Changelog
        run: npm run docs:generate

      - name: Commit Documentation Changes
        if: ${{ github.event_name == 'push' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for v${{ needs.release.outputs.newReleaseVersion }}" || echo "No changes to commit"
          git push
