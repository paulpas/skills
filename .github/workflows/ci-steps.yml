name: CI Setup Steps

description: Reusable workflow for Node.js CI setup including checkout, Node.js setup, and npm install

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      cache-npm:
        description: 'Enable npm cache'
        required: false
        type: boolean
        default: true

jobs:
  ci-setup:
    name: CI Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.cache-npm && 'npm' || '' }}

      - name: Install dependencies
        run: npm ci
